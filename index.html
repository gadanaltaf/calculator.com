<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<style>
    *{
       margin: 0;
       padding: 0;
    }
    body{
        background-repeat: no-repeat;
        background-size: cover;
    }
    
    #calculator{
        background-color: transparent;
        height: 13cm;
        width: 8cm;
        margin-top: 3.5cm;
        margin-left: 16.5cm;
        border-radius: 15px;
        background: rgba( 255, 255, 255, 0.2 );
        box-shadow: 0 8px 32px 0 rgba( 31, 38, 135, 0.37 );
        backdrop-filter: blur( 10px );
        border-radius: 10px;
        border: 2px solid white;
        transition: all 0.5s;
    }

    #calculator:hover{
        box-shadow: 0px 0px 46px 17px rgb(255, 255, 255);
        transition: all 0.5s;
    }

    #display{
        margin-top: 1cm;
        margin-left: 1.4cm;
        height: 1cm;
        width: 5cm;
        border-radius: 5px;
        background-color: transparent;
        color: white;
        font-size: 25px;
        border: 2px solid white;
        font-family: digifaceWide;
        text-align: end;
        outline: none;
        transition: color 1s ease;
    }
    ::placeholder{
        color: white;
    }
   

    #button{
        display: grid ;
        grid-template-columns:repeat(4,1fr) ;
        margin-top: .7cm;
    }
    button{
        height: 1cm;
        width: 1cm;
        margin: 0.5cm;
        border-radius: 10px;
        font-size: 25px;
        background-color: transparent;
        border: none;
        color: white;
        transition: all 0.5s;
    }
    button:hover{
        box-shadow: 0px 0px 20px 6px rgb(255, 255, 255);
        transition: all 0.5s;
    }
    #myVideo{
        position: fixed;
        top: 0;
        left:0;

    }
</style>
<body>
    <video autoplay muted loop id="myVideo">
        <source src="C:\Users\acer\Desktop\altaf gadan\web.bg.mp4" type="video/mp4">
    </video>
        <div id="calculator" >
                <input type="text" id="display" placeholder="0"> 
            <div id="button">
                <button onclick="AllclearDisplay('All_clear')" id="clear">Ac</button>
                <button onclick="apendTodisplay('.')">.</button>
                <button onclick="apendTodisplay('*')" class="opratorbutton">*</button>
                <button onclick="apendTodisplay('+')" class="opratorbutton">+</button>
                <button onclick="apendTodisplay('1')">1</button>
                <button onclick="apendTodisplay('2')">2</button>
                <button onclick="apendTodisplay('3')">3</button>
                <button onclick="apendTodisplay('-')" class="opratorbutton">-</button>
                <button onclick="apendTodisplay('4')">4</button>
                <button onclick="apendTodisplay('5')">5</button>
                <button onclick="apendTodisplay('6')">6</button>
                <button onclick="apendTodisplay('/')" class="opratorbutton">/</button>
                <button onclick="apendTodisplay('7')">7</button>
                <button onclick="apendTodisplay('8')">8</button>
                <button onclick="apendTodisplay('9')">9</button>
                <button onclick="calculate('=')">=</button>
                <button onclick="apendTodisplay('0')">0</button>
                <button onclick="clearDisplay('clear')" id="clear">C</button>
                
                <!-- <button class=""></button>
                <button class=""></button> -->
            </div>
        </div> 
    </body>
        <script>
                const display = document.getElementById("display");

                function apendTodisplay(input){
                    display.value += input;
                }

                function AllclearDisplay(){
                    display.value = "0"
                }

                function clearDisplay(){
                    display.value = display.value.slice(0,-1)
                }
                function calculate(){
                    try{
                        display.value = eval(display.value);
                    }
                    catch(error){
                        display.value = " ";
                    }
                }
        </script>

</html>
